<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Coins</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }


        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 40px;
            max-width: 1000px;
        }


        .coin-wrapper {
            perspective: 1000px;
            height: 280px;
            display: flex;
            justify-content: center;
            align-items: center;
        }


        .coin-face {
            width: 100%;
            height: 100%;
            position: absolute;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            backface-visibility: hidden;
            font-size: 60px;            
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset -5px -5px 15px rgba(0, 0, 0, 0.3), inset 5px 5px 15px rgba(255, 255, 255, 0.1);
            border: 8px solid;
        }


        .front {
            background: linear-gradient(135deg, #f7931a 0%, #ffb84d 50%, #f7931a 100%);
            border-color: #d68000;
            color: #8b4513;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .back {
            background: linear-gradient(135deg, #ffb84d 0%, #f7931a 50%, #ffb84d 100%);
            border-color: #d68000;
            transform: rotateY(180deg);
            color: #8b4513;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .coin-symbol {
            font-family: Arial, sans-serif;
            letter-spacing: 2px;
        }

        .coin-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid rgba(139, 69, 19, 0.5);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scaleZ(0.5);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.4);
        }


        .coin-details {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }


        .detail-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 2px dashed rgba(139, 69, 19, 0.3);
        }

        .coin-label {
            text-align: center;
            margin-top: 20px;
            color: #f7931a;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
        }
